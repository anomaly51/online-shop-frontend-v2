name: Build and deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: online-shop-frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: anomaly51/github-actions-toolkit/.github/workflows/harbor-argocd-app.yml@main
    with:
      app-name: online-shop-frontend
      image-repository: harbor.api-api-api.com/online-shop/frontend
    secrets: inherit
