name: Build and deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: online-shop-frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: harbor.api-api-api.com
  IMAGE_REPOSITORY: harbor.api-api-api.com/online-shop/frontend
  BUILD_CACHE_REPOSITORY: harbor.api-api-api.com/shisha/ci-build-cache
  BUILDKIT_ENDPOINT: tcp://arc-buildkit.arc-runners.svc.cluster.local:1234
  ARGOCD_APPLICATION: online-shop-frontend
  ARGOCD_CLI_VERSION: v3.4.3
  DEPLOY_TIMEOUT_SECONDS: "1200"
  DEPLOY_POLL_SECONDS: "5"

jobs:
  image:
    name: Build image
    runs-on: arc-runner-set
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      cache_ref: ${{ steps.meta.outputs.cache_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          image_tag="sha-${short_sha}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cache_tag="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9_.-]+#-#g')"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REPOSITORY}:${image_tag}" >> "$GITHUB_OUTPUT"
          echo "cache_ref=${BUILD_CACHE_REPOSITORY}:${cache_tag}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Set up remote BuildKit
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: ${{ env.BUILDKIT_ENDPOINT }}

      - name: Login to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME || secrets.HARBOR_PUSH_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD || secrets.HARBOR_PUSH_PASSWORD }}

      - name: Check image tag in Harbor
        id: image_exists
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${{ steps.meta.outputs.image_ref }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists: ${{ steps.meta.outputs.image_ref }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image_ref }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}

      - name: Build image with registry cache
        if: github.event_name != 'pull_request' && steps.image_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}

  verify-deploy:
    name: Verify deploy
    needs: image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: arc-runner-set
    steps:
      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          case "$(uname -m)" in
            x86_64|amd64)
              argocd_asset=argocd-linux-amd64
              jq_asset=jq-linux-amd64
              ;;
            aarch64|arm64)
              argocd_asset=argocd-linux-arm64
              jq_asset=jq-linux-arm64
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac
          curl -fsSL "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_CLI_VERSION}/${argocd_asset}" -o "${RUNNER_TEMP}/bin/argocd"
          chmod +x "${RUNNER_TEMP}/bin/argocd"
          if ! command -v jq >/dev/null 2>&1; then
            curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-1.8.1/${jq_asset}" -o "${RUNNER_TEMP}/bin/jq"
            chmod +x "${RUNNER_TEMP}/bin/jq"
          fi
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Wait for Argo CD deployment verification
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
          ARGOCD_INSECURE: ${{ secrets.ARGOCD_INSECURE }}
          IMAGE_REF: ${{ needs.image.outputs.image_ref }}
        shell: bash
        run: |
          set -euo pipefail
          : "${ARGOCD_SERVER:?Set the ARGOCD_SERVER repository secret}"
          : "${IMAGE_REF:?Missing built image ref}"

          argocd_common=(--grpc-web)
          if [ "${ARGOCD_INSECURE:-true}" != "false" ]; then
            argocd_common+=(--insecure)
          fi

          if [ -n "${ARGOCD_USERNAME:-}" ] && [ -n "${ARGOCD_PASSWORD:-}" ]; then
            argocd login "$ARGOCD_SERVER" --username "$ARGOCD_USERNAME" --password "$ARGOCD_PASSWORD" "${argocd_common[@]}"
            argocd_args=(--server "$ARGOCD_SERVER" "${argocd_common[@]}")
          elif [ -n "${ARGOCD_AUTH_TOKEN:-}" ]; then
            argocd_args=(--server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" "${argocd_common[@]}")
          else
            echo "Set ARGOCD_USERNAME and ARGOCD_PASSWORD or ARGOCD_AUTH_TOKEN"
            exit 1
          fi

          deadline=$((SECONDS + DEPLOY_TIMEOUT_SECONDS))
          while [ "$SECONDS" -lt "$deadline" ]; do
            app_json="$(argocd app get "$ARGOCD_APPLICATION" --refresh -o json "${argocd_args[@]}")"
            sync_status="$(jq -r '.status.sync.status // "Unknown"' <<< "$app_json")"
            health_status="$(jq -r '.status.health.status // "Unknown"' <<< "$app_json")"
            images="$(jq -r '.status.summary.images[]?' <<< "$app_json")"

            if grep -Fxq "$IMAGE_REF" <<< "$images" \
              && [ "$sync_status" = "Synced" ] \
              && [ "$health_status" = "Healthy" ]; then
              echo "Verified ${ARGOCD_APPLICATION} at ${IMAGE_REF}"
              exit 0
            fi

            echo "Waiting for ${ARGOCD_APPLICATION}: sync=${sync_status}, health=${health_status}, target=${IMAGE_REF}"
            sleep "$DEPLOY_POLL_SECONDS"
          done

          echo "Timed out waiting for ${ARGOCD_APPLICATION} to deploy ${IMAGE_REF}"
          argocd app get "$ARGOCD_APPLICATION" -o wide "${argocd_args[@]}" || true
          exit 1
